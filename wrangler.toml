name = "ai-coding-preppen"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Structured data: inspection orders, form responses, underwriter decisions.
# database_id is filled in by `wrangler d1 create inspections` (see Phase 0 setup).
[[d1_databases]]
binding = "DB"
database_name = "inspections"
database_id = "0b40f043-a5ca-40e5-8697-f63f980ba4d6"
migrations_dir = "migrations"

# Photo storage (Phase 3). Tests simulate this bucket in-memory via miniflare,
# so `npm test` needs no real R2. DEPLOY PREREQUISITE: `wrangler deploy` needs
# an OAuth token with the `r2` scope OR the `inspection-photos` bucket created
# in the Cloudflare dashboard first — otherwise deploy fails on this binding.
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "inspection-photos"

# React SPA build output (Phase 1). `npm run build` (vite) emits ./dist/client.
# Workers serves a matching static file if present, else invokes the Worker;
# unmatched non-API paths fall back to index.html so client-side routing works.
# Run `npm run build` before `wrangler deploy`.
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
